<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020617;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Dark background -->
  <rect width="200" height="200" fill="url(#bgGradient)"/>
  
  <!-- Glow circles -->
  <circle cx="50" cy="50" r="80" fill="#06b6d4" opacity="0.1"/>
  <circle cx="150" cy="150" r="80" fill="#2563eb" opacity="0.1"/>
  
  <!-- Border -->
  <rect width="200" height="200" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.3" rx="20"/>
  
  <!-- Large "S" text -->
  <text x="100" y="130" font-family="Arial, sans-serif" font-size="120" font-weight="bold" text-anchor="middle" fill="url(#textGradient)" letter-spacing="-5">S</text>
</svg>